version: '3.8'

services:
  # Frontend - React with Three.js Avatar
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gai-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8000
      - REACT_APP_WS_URL=ws://backend:8000
      - NODE_ENV=development
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - gai-network
    restart: unless-stopped

  # Backend - FastAPI with MCP Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gai-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://gai_user:gai_password@postgres:5432/gai_db
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_DB_PATH=/app/data/chroma
      - PUBMED_EMAIL=${PUBMED_EMAIL}
      - DEBUG=true
    depends_on:
      - postgres
      - chroma
    volumes:
      - ./backend:/app
      - gai-data:/app/data
      - ./backend/logs:/app/logs
    networks:
      - gai-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: gai-postgres
    environment:
      POSTGRES_USER: gai_user
      POSTGRES_PASSWORD: gai_password
      POSTGRES_DB: gai_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - gai-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gai_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Chroma Vector Database
  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: gai-chroma
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_DB_IMPL=duckdb+parquet
      - PERSIST_DIRECTORY=/chroma/data
    volumes:
      - chroma-data:/chroma/data
    networks:
      - gai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Knowledge Base Indexer Service
  knowledge-base:
    build:
      context: ./knowledge-base
      dockerfile: Dockerfile
    container_name: gai-kb
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - PUBMED_EMAIL=${PUBMED_EMAIL}
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
    depends_on:
      chroma:
        condition: service_healthy
    volumes:
      - ./knowledge-base:/app
      - gai-data:/app/data
    networks:
      - gai-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  chroma-data:
    driver: local
  gai-data:
    driver: local

networks:
  gai-network:
    driver: bridge
